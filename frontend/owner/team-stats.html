<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP Hub — Team Stats</title>
    <link rel="stylesheet" href="/css/hub.css">
    <style>
        .team-block { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 20px; overflow: hidden; }
        .team-block-header { display: flex; align-items: center; gap: 14px; padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--bg3); }
        .team-logo { width: 38px; height: 38px; border-radius: 6px; object-fit: contain; background: var(--bg2); border: 1px solid var(--border); flex-shrink: 0; }
        .team-logo-ph { width: 38px; height: 38px; border-radius: 6px; background: var(--bg2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 900; color: var(--accent); flex-shrink: 0; }
        .team-block-name { font-weight: 700; font-size: 0.95rem; }
        .team-block-sub { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }

        .stats-panels { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 0; }
        .stats-panel { padding: 16px 20px; border-right: 1px solid var(--border); }
        .stats-panel:last-child { border-right: none; }
        .panel-title { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 12px; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .stat-row:last-child { border-bottom: none; }
        .stat-row-label { color: var(--text-muted); }
        .stat-row-val { font-weight: 700; color: var(--text); }
        .stat-row-val.accent { color: var(--accent); }
        .stat-row-val.green  { color: #22c55e; }
        .stat-row-val.yellow { color: #f59e0b; }
        .stat-row-val.red    { color: #ef4444; }
        .stat-row-val.muted  { color: var(--text-muted); font-weight: 400; font-style: italic; }

        .search-row { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="hub-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div class="page-content">
        <div class="page-header">
            <div>
                <h1>Team Stats</h1>
                <p style="color:var(--text-muted);font-size:0.82rem;">Per-team activity, gallery, pracc and player data</p>
            </div>
        </div>

        <div class="search-row">
            <input type="text" id="searchInput" class="form-input" placeholder="Search team…" style="max-width:240px;" oninput="renderTeams()">
        </div>

        <div id="teamsBody"><p style="color:var(--text-muted);">Loading...</p></div>
        </div>
    </main>
</div>

<script type="module">import { api, requireAuth } from '/js/api.js';
import { buildSidebar, formatDate } from '/js/utils.js';

const user = requireAuth(['owner']);
if (!user) throw new Error('redirect');
document.getElementById('sidebar').innerHTML = buildSidebar('owner', 'team-stats');

let teams = [];

async function load() {
    try {
        teams = await api('/api/admin/team-stats');
        renderTeams();
    } catch (err) {
        document.getElementById('teamsBody').innerHTML = `<p style="color:var(--error);">${err.message}</p>`;
    }
}

function val(v, cls = '') {
    if (v === null || v === undefined) return `<span class="stat-row-val muted">—</span>`;
    return `<span class="stat-row-val ${cls}">${v}</span>`;
}

function flag(n, warnAt, dangerAt) {
    const cls = n >= dangerAt ? 'red' : n >= warnAt ? 'yellow' : '';
    return val(n, cls);
}

window.renderTeams = () => {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = q ? teams.filter(t => t.name.toLowerCase().includes(q) || t.tag.toLowerCase().includes(q)) : teams;

    if (!filtered.length) {
        document.getElementById('teamsBody').innerHTML = '<p style="color:var(--text-muted);">No teams found.</p>';
        return;
    }

    document.getElementById('teamsBody').innerHTML = filtered.map(t => {
        const logo = t.logoUrl
            ? `<img class="team-logo" src="${t.logoUrl}" alt="">`
            : `<div class="team-logo-ph">${t.tag.slice(0,2)}</div>`;

        const daysSincePracc = t.lastPracc
            ? Math.floor((Date.now() - new Date(t.lastPracc)) / 86400000)
            : null;
        const praccAgeVal = daysSincePracc === null
            ? `<span class="stat-row-val muted">no pracc</span>`
            : `<span class="stat-row-val ${daysSincePracc >= 14 ? 'red' : daysSincePracc >= 7 ? 'yellow' : 'green'}">${daysSincePracc}d ago</span>`;

        const winRateVal = t.winRate === null
            ? `<span class="stat-row-val muted">—</span>`
            : `<span class="stat-row-val ${t.winRate >= 60 ? 'green' : t.winRate >= 40 ? '' : 'red'}">${t.winRate}%</span>`;

        return `
        <div class="team-block">
            <div class="team-block-header">
                ${logo}
                <div>
                    <div class="team-block-name">${t.name}</div>
                    <div class="team-block-sub">${t.region} · Valorant</div>
                </div>
            </div>
            <div class="stats-panels">
                <div class="stats-panel">
                    <div class="panel-title">👤 Players</div>
                    <div class="stat-row"><span class="stat-row-label">Players</span>${val(t.players)}</div>
                    <div class="stat-row"><span class="stat-row-label">Captains</span>${val(t.captains)}</div>
                    <div class="stat-row"><span class="stat-row-label">Managers</span>${val(t.managers)}</div>
                    <div class="stat-row"><span class="stat-row-label">No profile photo</span>${flag(t.noPhoto, 1, 3)}</div>
                    <div class="stat-row"><span class="stat-row-label">Inactive accounts</span>${flag(t.inactive, 1, 3)}</div>
                </div>
                <div class="stats-panel">
                    <div class="panel-title">🖼️ Gallery</div>
                    <div class="stat-row"><span class="stat-row-label">Total uploads</span>${val(t.galleryPhotos, t.galleryPhotos === 0 ? 'yellow' : '')}</div>
                    <div class="stat-row"><span class="stat-row-label">Management photos</span>${val(t.managementPhotos)}</div>
                    <div class="stat-row"><span class="stat-row-label">Player photos</span>${val(t.playerPhotos)}</div>
                    <div class="stat-row"><span class="stat-row-label">Admin uploads</span>${val(t.adminPhotos)}</div>
                </div>
                <div class="stats-panel">
                    <div class="panel-title">🎮 Pracc</div>
                    <div class="stat-row"><span class="stat-row-label">Total entries</span>${val(t.praccTotal)}</div>
                    <div class="stat-row"><span class="stat-row-label">Wins / Losses / Draws</span><span class="stat-row-val"><span style="color:#22c55e">${t.praccWins}</span> / <span style="color:#ef4444">${t.praccLosses}</span> / <span style="color:#888">${t.praccDraws}</span></span></div>
                    <div class="stat-row"><span class="stat-row-label">Win rate</span>${winRateVal}</div>
                    <div class="stat-row"><span class="stat-row-label">Last pracc</span>${praccAgeVal}</div>
                </div>
                <div class="stats-panel">
                    <div class="panel-title">📋 Activity</div>
                    <div class="stat-row"><span class="stat-row-label">Open tasks</span>${flag(t.tasksOpen, 5, 10)}</div>
                    <div class="stat-row"><span class="stat-row-label">Completed tasks</span>${val(t.tasksDone, 'green')}</div>
                    <div class="stat-row"><span class="stat-row-label">Announcements</span>${val(t.announcements)}</div>
                    <div class="stat-row"><span class="stat-row-label">Pinned</span>${val(t.pinnedAnnouncements)}</div>
                </div>
            </div>
        </div>`;
    }).join('');
};

load();
</script>
</body>
</html>
