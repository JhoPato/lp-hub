<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP Hub — Owner Dashboard</title>
    <link rel="stylesheet" href="/css/hub.css">
    <style>
        .stats-section { margin-bottom: 28px; }
        .stats-section-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 16px; display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center; }
        .stat-icon { line-height: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); }
        .stat-value { font-size: 2rem; font-weight: 900; color: var(--accent); line-height: 1; }
        .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
        .stat-card.accent-green  .stat-value { color: var(--success, #22c55e); }
        .stat-card.accent-green  .stat-icon  { color: #22c55e; }
        .stat-card.accent-yellow .stat-value { color: #f59e0b; }
        .stat-card.accent-yellow .stat-icon  { color: #f59e0b; }
        .stat-card.accent-red    .stat-value { color: var(--error, #ef4444); }
        .stat-card.accent-red    .stat-icon  { color: #ef4444; }
        .stat-card.accent-blue   .stat-value { color: #60a5fa; }
        .stat-card.accent-blue   .stat-icon  { color: #60a5fa; }
        .stat-card.accent-purple .stat-value { color: #a78bfa; }
        .stat-card.accent-purple .stat-icon  { color: #a78bfa; }

        .storage-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 12px; }
        .storage-card:last-child { margin-bottom: 0; }
        .storage-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
        .storage-name { font-size: 0.84rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .storage-text { font-size: 0.75rem; color: var(--text-muted); }
        .progress-bar { height: 8px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 99px; transition: width 0.6s ease; background: var(--accent); }
        .progress-fill.warn { background: #f59e0b; }
        .progress-fill.danger { background: var(--error, #ef4444); }
    </style>
</head>
<body>
<div class="hub-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div class="page-content">
        <div class="page-header">
            <div>
                <h1>Owner Dashboard</h1>
                <p id="welcomeMsg" style="color:var(--text-muted);font-size:0.85rem;">Loading...</p>
            </div>
        </div>

        <div class="stats-section">
            <div class="stats-section-title">Organisation</div>
            <div class="stat-grid">
                <div class="stat-card accent-yellow">
                    <span class="stat-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 18.75h-9m9 0a3 3 0 013 3h-15a3 3 0 013-3m9 0v-3.375c0-.621-.503-1.125-1.125-1.125h-.871M7.5 18.75v-3.375c0-.621.504-1.125 1.125-1.125h.872m5.007 0H9.497m5.007 0a7.454 7.454 0 01-.982-3.172M9.497 14.25a7.454 7.454 0 00.981-3.172M5.25 4.236c-.982.143-1.954.317-2.916.52A6.003 6.003 0 007.73 9.728M5.25 4.236V4.5c0 2.108.966 3.99 2.48 5.228M5.25 4.236V2.721C7.456 2.41 9.71 2.25 12 2.25c2.291 0 4.545.16 6.75.47v1.516M7.73 9.728a6.726 6.726 0 002.748 1.35m8.272-6.842V4.5c0 2.108-.966 3.99-2.48 5.228m2.48-5.492a46.32 46.32 0 012.916.52 6.003 6.003 0 01-5.395 4.972m0 0a6.726 6.726 0 01-2.749 1.35m0 0a6.772 6.772 0 01-3.044 0"/></svg>
                    </span>
                    <div class="stat-value" id="statTeams">—</div>
                    <div class="stat-label">Teams</div>
                </div>
                <div class="stat-card accent-purple">
                    <span class="stat-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
                    </span>
                    <div class="stat-value" id="statPlayers">—</div>
                    <div class="stat-label">Players</div>
                </div>
                <div class="stat-card">
                    <span class="stat-icon" style="color:var(--accent);">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/></svg>
                    </span>
                    <div class="stat-value" id="statCaptains">—</div>
                    <div class="stat-label">Captains</div>
                </div>
                <div class="stat-card accent-yellow">
                    <span class="stat-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 14.15v4.25c0 1.094-.787 2.036-1.872 2.18-2.087.277-4.216.42-6.378.42s-4.291-.143-6.378-.42c-1.085-.144-1.872-1.086-1.872-2.18v-4.25m16.5 0a2.18 2.18 0 00.75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 00-3.413-.387m4.5 8.006c-.194.165-.42.295-.673.38A23.978 23.978 0 0112 15.75c-2.648 0-5.195-.429-7.577-1.22a2.016 2.016 0 01-.673-.38m0 0A2.18 2.18 0 013 12.489V8.706c0-1.081.768-2.015 1.837-2.175a48.111 48.111 0 013.413-.387m7.5 0V5.25A2.25 2.25 0 0013.5 3h-3a2.25 2.25 0 00-2.25 2.25v.894m7.5 0a48.667 48.667 0 00-7.5 0M12 12.75h.008v.008H12v-.008z"/></svg>
                    </span>
                    <div class="stat-value" id="statManagers">—</div>
                    <div class="stat-label">Managers</div>
                </div>
                <div class="stat-card accent-blue">
                    <span class="stat-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg>
                    </span>
                    <div class="stat-value" id="statTotal">—</div>
                    <div class="stat-label">Total Users</div>
                </div>
            </div>
        </div>

        <div class="stats-section">
            <div class="stats-section-title">Invite Codes</div>
            <div class="stat-grid">
                <div class="stat-card accent-green">
                    <span class="stat-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </span>
                    <div class="stat-value" id="statInviteActive">—</div>
                    <div class="stat-label">Active</div>
                </div>
                <div class="stat-card accent-purple">
                    <span class="stat-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM4 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 0110.374 21c-2.331 0-4.512-.645-6.374-1.766z"/></svg>
                    </span>
                    <div class="stat-value" id="statInviteUsed">—</div>
                    <div class="stat-label">Used</div>
                </div>
                <div class="stat-card accent-red">
                    <span class="stat-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </span>
                    <div class="stat-value" id="statInviteExpired">—</div>
                    <div class="stat-label">Expired</div>
                </div>
            </div>
        </div>

        <div class="stats-section">
            <div class="stats-section-title">Content</div>
            <div class="stat-grid">
                <div class="stat-card accent-green">
                    <span class="stat-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/></svg>
                    </span>
                    <div class="stat-value" id="statPhotos">—</div>
                    <div class="stat-label">Gallery Photos</div>
                </div>
                <div class="stat-card accent-yellow">
                    <span class="stat-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 9.776c.112-.017.227-.026.344-.026h15.812c.117 0 .232.009.344.026m-16.5 0a2.25 2.25 0 00-1.883 2.542l.857 6a2.25 2.25 0 002.227 1.932H19.05a2.25 2.25 0 002.227-1.932l.857-6a2.25 2.25 0 00-1.883-2.542m-16.5 0V6A2.25 2.25 0 016 3.75h3.879a1.5 1.5 0 011.06.44l2.122 2.12a1.5 1.5 0 001.06.44H18A2.25 2.25 0 0120.25 9v.776"/></svg>
                    </span>
                    <div class="stat-value" id="statAdminPhotos">—</div>
                    <div class="stat-label">Admin Uploads</div>
                </div>
                <div class="stat-card accent-blue">
                    <span class="stat-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 10.5A4.5 4.5 0 016.75 6h10.5a4.5 4.5 0 014.5 4.5v3a4.5 4.5 0 01-4.5 4.5H6.75a4.5 4.5 0 01-4.5-4.5v-3z"/><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 12h1.5m-.75-.75v1.5m6.75-.75h.008v.008H15v-.008zm1.5 0h.008v.008h-.008v-.008z"/></svg>
                    </span>
                    <div class="stat-value" id="statPracc">—</div>
                    <div class="stat-label">Pracc Entries</div>
                </div>
            </div>
        </div>

        <div class="stats-section">
            <div class="stats-section-title">Storage</div>
            <div id="storageSection"><p style="color:var(--text-muted);font-size:0.82rem;">Loading...</p></div>
        </div>

        </div>
    </main>
</div>

<script type="module">import { api, requireAuth } from '/js/api.js';
import { buildSidebar } from '/js/utils.js';

const cloudIcon = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="16" height="16" style="color:#60a5fa;flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15a4.5 4.5 0 004.5 4.5H18a3.75 3.75 0 001.332-7.257 3 3 0 00-3.758-3.848 5.25 5.25 0 00-10.233 2.33A4.502 4.502 0 002.25 15z"/></svg>`;
const dbIcon    = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="16" height="16" style="color:#22c55e;flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375m16.5 5.625c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125"/></svg>`;

const user = requireAuth(['owner']);
if (user) {
    document.getElementById('sidebar').innerHTML = buildSidebar('owner', 'dashboard');
    document.getElementById('welcomeMsg').textContent = `Welcome back, ${user.username}`;
    load();
}

async function load() {
    try {
        const s = await api('/api/admin/stats');
        document.getElementById('statTeams').textContent         = s.teamCount      ?? '—';
        document.getElementById('statPlayers').textContent       = s.playerCount    ?? '—';
        document.getElementById('statCaptains').textContent      = s.captainCount   ?? '—';
        document.getElementById('statManagers').textContent      = s.managerCount   ?? '—';
        document.getElementById('statTotal').textContent         = s.totalUsers     ?? '—';
        document.getElementById('statInviteActive').textContent  = s.inviteActive   ?? '—';
        document.getElementById('statInviteUsed').textContent    = s.inviteUsed     ?? '—';
        document.getElementById('statInviteExpired').textContent = s.inviteExpired  ?? '—';
        document.getElementById('statPhotos').textContent        = s.photoCount     ?? '—';
        document.getElementById('statAdminPhotos').textContent   = s.adminPhotoCount?? '—';
        document.getElementById('statPracc').textContent         = s.praccCount     ?? '—';
    } catch (err) {
        document.getElementById('welcomeMsg').textContent = 'Failed to load stats.';
    }

    try {
        const st = await api('/api/admin/storage');
        const el = document.getElementById('storageSection');
        const bar = (pct) => {
            const cls = pct >= 90 ? 'danger' : pct >= 70 ? 'warn' : '';
            return `<div class="progress-bar"><div class="progress-fill ${cls}" style="width:${Math.min(pct,100)}%"></div></div>`;
        };
        let html = '';
        if (st.cloudinary) {
            const c = st.cloudinary;
            html += `<div class="storage-card">
                <div class="storage-header">
                    <span class="storage-name">${cloudIcon} Cloudinary</span>
                    <span class="storage-text">${c.usedMB} MB / ${c.limitGB} GB &nbsp;·&nbsp; ${c.pct}%</span>
                </div>
                ${bar(c.pct)}
            </div>`;
        }
        if (st.mongo) {
            const m = st.mongo;
            html += `<div class="storage-card">
                <div class="storage-header">
                    <span class="storage-name">${dbIcon} MongoDB Atlas</span>
                    <span class="storage-text">${m.usedMB} MB / ${m.limitMB} MB &nbsp;·&nbsp; ${m.pct}%</span>
                </div>
                ${bar(m.pct)}
            </div>`;
        }
        if (!html) html = '<p style="color:var(--text-muted);font-size:0.82rem;">Storage data unavailable.</p>';
        el.innerHTML = html;
    } catch {
        document.getElementById('storageSection').innerHTML = '<p style="color:var(--text-muted);font-size:0.82rem;">Storage data unavailable.</p>';
    }
}</script>
<script src="/js/discord-notify.js"></script>
</body>
</html>
