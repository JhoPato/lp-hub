<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP Hub — Login</title>
    <link rel="stylesheet" href="/css/hub.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">LOST PUPPIES <span>HUB</span></div>
        <div class="auth-subtitle">Internal Team Platform</div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email or Username</label>
                <input type="text" id="email" placeholder="your@email.com or username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="btnLogin">SIGN IN</button>
        </form>

        <div class="discord-divider">or</div>
        <button class="btn btn-discord btn-block" id="btnDiscordLogin">
            <svg width="18" height="14" viewBox="0 0 71 55" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M60.1 4.9A58.5 58.5 0 0 0 45.5.4a.2.2 0 0 0-.2.1 40.7 40.7 0 0 0-1.8 3.7 54 54 0 0 0-16.2 0A37.5 37.5 0 0 0 25.5.5a.2.2 0 0 0-.2-.1 58.4 58.4 0 0 0-14.6 4.5.2.2 0 0 0-.1.1C1.6 18.7-.9 32.2.3 45.5a.2.2 0 0 0 .1.2 58.8 58.8 0 0 0 17.7 8.9.2.2 0 0 0 .3-.1 42 42 0 0 0 3.6-5.9.2.2 0 0 0-.1-.3 38.7 38.7 0 0 1-5.5-2.6.2.2 0 0 1 0-.4c.4-.3.7-.6 1.1-.8a.2.2 0 0 1 .2 0c11.5 5.3 24 5.3 35.3 0a.2.2 0 0 1 .3 0l1 .9a.2.2 0 0 1 0 .4 36 36 0 0 1-5.5 2.6.2.2 0 0 0-.1.3c1 2 2.2 4 3.6 5.9a.2.2 0 0 0 .3.1 58.6 58.6 0 0 0 17.8-8.9.2.2 0 0 0 .1-.2c1.5-15.3-2.5-28.7-10.5-40.5a.2.2 0 0 0-.1-.1ZM23.7 37.7c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2c3.6 0 6.5 3.3 6.4 7.2 0 4-2.8 7.2-6.4 7.2Zm23.7 0c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2c3.6 0 6.5 3.3 6.4 7.2 0 4-2.8 7.2-6.4 7.2Z" fill="currentColor"/></svg>
            LOGIN WITH DISCORD
        </button>

        <div id="alertMsg" class="alert"></div>

        <p style="text-align:center; margin-top:20px; font-size:0.8rem; color:var(--text-muted);">
            Have an invite code? <a href="/register.html">Create account</a>
        </p>
    </div>
</div>

<script>const stored = localStorage.getItem('lp_hub_token');
    if (stored) {
        const user = JSON.parse(localStorage.getItem('lp_hub_user') || 'null') || {};
        if (user.role === 'owner')   window.location.href = '/owner/dashboard.html';
        else if (user.role === 'manager') window.location.href = '/manager/dashboard.html';
        else if (user.role === 'social')  window.location.href = '/social/news.html';
        else if (user.role === 'player' || user.role === 'captain') window.location.href = '/player/dashboard.html';
        else {
            localStorage.removeItem('lp_hub_token');
            localStorage.removeItem('lp_hub_user');
            localStorage.removeItem('lp_hub_owner_token');
            localStorage.removeItem('lp_hub_owner_user');
        }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnLogin');
        const alert = document.getElementById('alertMsg');
        btn.disabled = true; btn.textContent = 'SIGNING IN...';
        alert.className = 'alert'; alert.textContent = '';

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email:    document.getElementById('email').value.trim(),
                    password: document.getElementById('password').value,
                })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);

            if (data.requiresTeamSelect) {
                sessionStorage.setItem('lp_hub_team_select', JSON.stringify({
                    tempToken: data.tempToken,
                    teams:     data.teams,
                    user:      data.user,
                }));
                window.location.href = '/hub-select.html';
                return;
            }

            localStorage.setItem('lp_hub_token', data.token);
            localStorage.setItem('lp_hub_user',  JSON.stringify(data.user));
            localStorage.removeItem('lp_hub_teams');

            if (data.user.role === 'owner')        window.location.href = '/owner/dashboard.html';
            else if (data.user.role === 'manager') window.location.href = '/manager/dashboard.html';
            else if (data.user.role === 'social')  window.location.href = '/social/news.html';
            else window.location.href = '/player/dashboard.html';
        } catch (err) {
            alert.textContent = err.message;
            alert.className = 'alert alert-error show';
            btn.disabled = false; btn.textContent = 'SIGN IN';
        }
    });

    document.getElementById('btnDiscordLogin').addEventListener('click', () => {
        window.location.href = '/api/auth/discord?action=login';
    });

    const _params = new URLSearchParams(window.location.search);
    if (_params.get('session_expired') === '1') {
        const _el = document.getElementById('alertMsg');
        _el.textContent = 'Your session has expired. Please sign in again.';
        _el.className   = 'alert alert-error show';
    }
    const _discordToken = _params.get('discord_token');
    if (_discordToken) {
        const _role = _params.get('role') || '';
        localStorage.setItem('lp_hub_token', _discordToken);
        fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + _discordToken } })
            .then(r => r.ok ? r.json() : null)
            .then(me => {
                if (me) localStorage.setItem('lp_hub_user', JSON.stringify({ id: me._id, username: me.username, role: me.role, teamId: me.teamId, discordAvatar: me.discordAvatar || null }));
                if (_role === 'owner')        window.location.href = '/owner/dashboard.html';
                else if (_role === 'manager') window.location.href = '/manager/dashboard.html';
                else if (_role === 'social')  window.location.href = '/social/news.html';
                else                          window.location.href = '/player/dashboard.html';
            })
            .catch(() => {
                if (_role === 'owner')        window.location.href = '/owner/dashboard.html';
                else if (_role === 'manager') window.location.href = '/manager/dashboard.html';
                else if (_role === 'social')  window.location.href = '/social/news.html';
                else                          window.location.href = '/player/dashboard.html';
            });
    }

    const _discordError = _params.get('discord_error');
    if (_discordError) {
        const _msgs = {
            no_account:    'No account linked to this Discord. Register first.',
            deactivated:   'Account deactivated. Contact your manager.',
            invalid_state: 'Session expired. Try again.',
            server_error:  'Server error. Try again.',
            access_denied: 'Discord authorization cancelled.',
        };
        const _el = document.getElementById('alertMsg');
        _el.textContent = _msgs[_discordError] || 'Discord login failed.';
        _el.className   = 'alert alert-error show';
    }
</script>
</body>
</html>
