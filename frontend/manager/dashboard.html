<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP Hub — Manager Dashboard</title>
    <link rel="stylesheet" href="/css/hub.css">
    <style>.stat-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap:12px; margin-bottom:24px; }
        .stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:center; }
        .stat-value { font-size:2rem; font-weight:900; color:var(--accent); line-height:1; }
        .stat-label { font-size:0.72rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-top:4px; }</style>
</head>
<body>
<div class="hub-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div class="page-content">
        <div class="page-header">
            <h1>Manager Dashboard</h1>
            <p id="welcomeMsg">Welcome back!</p>
        </div>

        <div class="stat-grid" id="statsGrid">
            <div class="stat-card"><div class="stat-value" id="statPlayers">—</div><div class="stat-label">Players</div></div>
            <div class="stat-card"><div class="stat-value" id="statTasks">—</div><div class="stat-label">Open Tasks</div></div>
            <div class="stat-card"><div class="stat-value" id="statEvents">—</div><div class="stat-label">Events (7d)</div></div>
            <div class="stat-card"><div class="stat-value" id="statPraccs">—</div><div class="stat-label">Praccs Logged</div></div>
        </div>

        <div class="grid-2" style="margin-bottom:24px;">
            <div class="card">
                <div class="card-header">
                    <span class="card-title"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="16" height="16" style="vertical-align:middle;margin-right:5px;flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 9v7.5"/></svg>Upcoming Events</span>
                    <a href="/manager/schedule.html" style="font-size:0.78rem;">Manage →</a>
                </div>
                <div id="upcomingEvents"><p style="color:var(--text-muted);font-size:0.85rem;">Loading...</p></div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span class="card-title"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="16" height="16" style="vertical-align:middle;margin-right:5px;flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M10.34 15.84c-.688-.06-1.386-.09-2.09-.09H7.5a4.5 4.5 0 110-9h.75c.704 0 1.402-.03 2.09-.09m0 9.18c.253.962.584 1.892.985 2.783.247.55.06 1.21-.463 1.511l-.657.38c-.551.318-1.26.117-1.527-.461a20.845 20.845 0 01-1.44-4.282m3.102.069a18.03 18.03 0 01-.59-4.59c0-1.586.205-3.124.59-4.59m0 9.18a23.848 23.848 0 018.835 2.535M10.34 6.66a23.847 23.847 0 008.835-2.535m0 0A23.74 23.74 0 0018.795 3m.38 1.125a23.91 23.91 0 011.014 5.395m-1.014 8.855c-.118.38-.245.754-.38 1.125m.38-1.125a23.91 23.91 0 001.014-5.395m0-3.46c.495.413.811 1.035.811 1.73 0 .695-.316 1.317-.811 1.73m0-3.46a24.347 24.347 0 010 3.46"/></svg>Announcements</span>
                    <a href="/manager/announcements.html" style="font-size:0.78rem;">Manage →</a>
                </div>
                <div id="recentAnn"><p style="color:var(--text-muted);font-size:0.85rem;">Loading...</p></div>
            </div>
        </div>

        <div class="grid-2">
            <div class="card">
                <div class="card-header">
                    <span class="card-title"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="16" height="16" style="vertical-align:middle;margin-right:5px;flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Open Tasks</span>
                    <a href="/manager/tasks.html" style="font-size:0.78rem;">Manage →</a>
                </div>
                <div id="openTasks"><p style="color:var(--text-muted);font-size:0.85rem;">Loading...</p></div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span class="card-title"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="16" height="16" style="vertical-align:middle;margin-right:5px;flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/></svg>Quick Actions</span>
                </div>
                <div style="display:flex;flex-direction:column;gap:8px;padding-top:4px;">
                    <a href="/manager/announcements.html" class="btn btn-secondary" style="text-align:center;">Post Announcement</a>
                    <a href="/manager/tasks.html" class="btn btn-secondary" style="text-align:center;">Create Task</a>
                    <a href="/manager/schedule.html" class="btn btn-secondary" style="text-align:center;">Add Event</a>
                    <a href="/manager/invites.html" class="btn btn-secondary" style="text-align:center;">Generate Invite</a>
                </div>
            </div>
        </div>
        </div>
    </main>
</div>
<script type="module">import { api, requireAuth } from '/js/api.js';
import { buildSidebar, formatDateTime, timeFromNow, updateNotificationBadges } from '/js/utils.js';

const user = requireAuth(['manager']);
if (user) {
    document.getElementById('sidebar').innerHTML = buildSidebar('manager', 'dashboard');
    document.getElementById('welcomeMsg').textContent = `Welcome back, ${user.username}!`;
    updateNotificationBadges({ api });
    loadDashboard();
}

// Builds a proper ISO date string from an event's `date` + `startTime` fields
function evDate(e) {
    const d = new Date(e.date);
    if (e.startTime) {
        const [h = 0, m = 0] = e.startTime.split(':').map(Number);
        d.setHours(h, m, 0, 0);
    }
    return d.toISOString();
}

async function loadDashboard() {
    try {
        const me = await api('/api/auth/me');
        const tn = document.getElementById('sidebarTeamName');
        if (tn) tn.textContent = me.teamId?.name || '';
    } catch {}

    // ── Events ────────────────────────────────────────────────────────────────
    try {
        const from = new Date().toISOString();
        const to   = new Date(Date.now() + 7 * 86400000).toISOString();
        const events = await api(`/api/schedule?from=${from}&to=${to}`);
        const evList = Array.isArray(events) ? events : [];
        document.getElementById('statEvents').textContent = evList.length;
        const el = document.getElementById('upcomingEvents');
        if (!evList.length) {
            el.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">No events this week.</p>';
        } else {
            el.innerHTML = evList.slice(0, 4).map(e => {
                const iso = evDate(e);
                return `
                <div class="list-row">
                    <span>${typeIcon(e.type)}</span>
                    <div style="flex:1;min-width:0;">
                        <div style="font-weight:600;font-size:0.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${e.title}</div>
                        <div style="font-size:0.75rem;color:var(--text-muted);">${formatDateTime(iso)} · ${timeFromNow(iso)}</div>
                    </div>
                </div>`;
            }).join('');
        }
    } catch { document.getElementById('upcomingEvents').innerHTML = '<p style="color:var(--error);font-size:0.85rem;">Failed to load events.</p>'; }

    // ── Announcements ─────────────────────────────────────────────────────────
    try {
        const { items } = await api('/api/announcements');
        const el = document.getElementById('recentAnn');
        if (!items?.length) {
            el.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">No announcements yet.</p>';
        } else {
            el.innerHTML = items.slice(0, 4).map(a => `
                <div class="list-row">
                    <div style="flex:1;min-width:0;">
                        <div style="font-weight:600;font-size:0.88rem;display:flex;align-items:center;gap:4px;">
                            ${a.isPinned ? '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="12" height="12" style="flex-shrink:0;color:var(--accent);"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0zM19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>' : ''}
                            ${a.title}
                        </div>
                        <div style="font-size:0.75rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${a.body.slice(0, 70)}${a.body.length > 70 ? '…' : ''}</div>
                    </div>
                </div>`).join('');
        }
    } catch { document.getElementById('recentAnn').innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">Could not load announcements.</p>'; }

    // ── Tasks ─────────────────────────────────────────────────────────────────
    try {
        const [r1, r2] = await Promise.all([
            api('/api/tasks?status=pending&limit=50'),
            api('/api/tasks?status=in_progress&limit=50'),
        ]);
        const all = [...(r1.tasks || []), ...(r2.tasks || [])];
        document.getElementById('statTasks').textContent = r1.total + r2.total || all.length;
        const el = document.getElementById('openTasks');
        if (!all.length) {
            el.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">No open tasks.</p>';
        } else {
            el.innerHTML = all.slice(0, 5).map(t => {
                // assignedTo is a populated array of {_id, username}
                const assignee = t.assignedTo?.length
                    ? t.assignedTo.map(u => u.username || u).join(', ')
                    : 'Team';
                const due = t.dueDate ? 'Due ' + timeFromNow(t.dueDate) : 'No due date';
                return `
                <div class="list-row">
                    <div style="flex:1;min-width:0;">
                        <div style="font-weight:600;font-size:0.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.title}</div>
                        <div style="font-size:0.75rem;color:var(--text-muted);">${assignee} · ${due}</div>
                    </div>
                    <span class="badge badge-${t.priority}">${t.priority}</span>
                </div>`;
            }).join('');
        }
    } catch { document.getElementById('openTasks').innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">Could not load tasks.</p>'; }

    // ── Players stat ──────────────────────────────────────────────────────────
    try {
        const players = await api('/api/team/players');
        const list = Array.isArray(players) ? players : (players.players || []);
        document.getElementById('statPlayers').textContent = list.length;
    } catch {}

    // ── Praccs stat ───────────────────────────────────────────────────────────
    try {
        const praccs = await api('/api/pracc/matches?limit=1');
        document.getElementById('statPraccs').textContent = praccs.total ?? '—';
    } catch { document.getElementById('statPraccs').textContent = '—'; }
}

function typeIcon(type, size = 18) {
    const p = (...ds) => `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="${size}" height="${size}" style="flex-shrink:0;">${ds.map(d=>`<path stroke-linecap="round" stroke-linejoin="round" d="${d}"/>`).join('')}</svg>`;
    const m = {
        tournament: p(`M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.562.562 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z`),
        match:      p(`M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z`),
        stream:     p(`M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 010 1.972l-11.54 6.347a1.125 1.125 0 01-1.667-.986V5.653z`),
        training:   p(`M2.25 10.5A4.5 4.5 0 016.75 6h10.5a4.5 4.5 0 014.5 4.5v3a4.5 4.5 0 01-4.5 4.5H6.75a4.5 4.5 0 01-4.5-4.5v-3z`,`M8.25 12h1.5m-.75-.75v1.5m6.75-.75h.008v.008H15v-.008zm1.5 0h.008v.008h-.008v-.008z`),
        warmup:     p(`M15.362 5.214A8.252 8.252 0 0112 21 8.25 8.25 0 016.038 7.047 8.287 8.287 0 009 9.601a8.983 8.983 0 013.361-6.867 8.21 8.21 0 003 2.48z`,`M12 18a3.75 3.75 0 00.495-7.468 5.99 5.99 0 00-1.925 3.547 5.975 5.975 0 01-2.133-1.001A3.75 3.75 0 0012 18z`),
    };
    return m[type] || p(`M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 9v7.5`);
}</script>
<script src="/js/discord-notify.js"></script>
</body>
</html>
