<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP Hub — Team Gallery</title>
    <link rel="stylesheet" href="/css/hub.css">
    <style>
        .gallery-section { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin-bottom:20px; }
        .gallery-section-title { font-size:0.75rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); margin-bottom:18px; padding-bottom:10px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
        .gallery-section-count { font-size:0.7rem; font-weight:400; color:var(--text-muted); margin-left:auto; }

        .gallery-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(190px, 1fr)); gap:12px; }
        .gallery-card { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
        .gallery-thumb { position:relative; aspect-ratio:4/3; overflow:hidden; cursor:pointer; }
        .gallery-thumb img { width:100%; height:100%; object-fit:cover; transition:transform 0.2s; display:block; }
        .gallery-thumb:hover img { transform:scale(1.05); }
        .gallery-thumb-overlay { position:absolute; inset:0; background:rgba(0,0,0,0); transition:background 0.2s; display:flex; align-items:center; justify-content:center; }
        .gallery-thumb:hover .gallery-thumb-overlay { background:rgba(0,0,0,0.4); }
        .gallery-thumb-icon { font-size:2rem; opacity:0; transition:opacity 0.2s; }
        .gallery-thumb:hover .gallery-thumb-icon { opacity:1; }

        .gallery-card-author { display:flex; align-items:center; gap:7px; padding:9px 11px 5px; }
        .author-avatar { width:22px; height:22px; border-radius:50%; object-fit:cover; background:var(--bg3); border:1px solid var(--border); font-size:0.6rem; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; }
        .author-name { font-size:0.78rem; font-weight:600; color:var(--text); }
        .author-date { font-size:0.67rem; color:var(--text-muted); margin-left:auto; }
        .gallery-card-caption { padding:0 11px 5px; font-size:0.75rem; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-height:17px; }
        .gallery-card-actions { padding:0 11px 9px; display:flex; gap:5px; }

        .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:36px 24px; color:var(--text-muted); font-size:0.82rem; gap:8px; }
        .empty-state-icon { font-size:2rem; opacity:0.3; }

        .lightbox { position:fixed; inset:0; background:rgba(0,0,0,0.93); z-index:300; display:flex; align-items:center; justify-content:center; padding:20px; }
        .lightbox-inner { position:relative; max-width:960px; width:100%; }
        .lightbox-inner img { width:100%; max-height:80vh; object-fit:contain; border-radius:var(--radius); display:block; }
        .lightbox-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; gap:12px; }
        .lightbox-author { display:flex; align-items:center; gap:8px; }
        .lightbox-author-av { width:28px; height:28px; border-radius:50%; object-fit:cover; background:var(--bg3); font-size:0.7rem; font-weight:700; display:flex; align-items:center; justify-content:center; overflow:hidden; border:1px solid var(--border); }
        .lightbox-author-name { font-weight:700; color:#fff; font-size:0.82rem; }
        .lightbox-caption-text { font-size:0.78rem; color:rgba(255,255,255,0.6); }
        .lightbox-close { background:none; border:none; color:#fff; font-size:1.8rem; cursor:pointer; line-height:1; padding:0; flex-shrink:0; }
        .lightbox-actions { display:flex; gap:8px; margin-top:12px; }
        .lightbox-btn { background:rgba(255,255,255,0.1); border:none; color:#fff; padding:6px 16px; border-radius:3px; cursor:pointer; font-size:0.8rem; transition:background 0.15s; }
        .lightbox-btn:hover { background:rgba(255,255,255,0.2); }
        .lightbox-btn.danger { color:#ff6b6b; }
        .lightbox-nav { display:flex; gap:8px; margin-top:12px; justify-content:center; }
        .lightbox-nav button { background:rgba(255,255,255,0.1); border:none; color:#fff; padding:6px 18px; border-radius:3px; cursor:pointer; font-size:0.8rem; }

        .caption-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:400; display:flex; align-items:center; justify-content:center; padding:16px; }
        .caption-modal { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:24px; width:100%; max-width:380px; }
    </style>
</head>
<body>
<div class="hub-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div class="page-content">
        <div class="page-header">
            <div>
                <h1>Team Gallery</h1>
                <p>Photos for content and social media use</p>
            </div>
        </div>

        <div id="galleryBody"><p style="color:var(--text-muted);">Loading...</p></div>
        </div>
    </main>
</div>

<div class="lightbox" id="lightbox" style="display:none;" onclick="if(event.target===this)closeLightbox()">
    <div class="lightbox-inner">
        <div class="lightbox-top">
            <div class="lightbox-author">
                <div class="lightbox-author-av" id="lbAuthorAv"></div>
                <div>
                    <div class="lightbox-author-name" id="lbAuthorName"></div>
                    <div class="lightbox-caption-text" id="lbCaption"></div>
                </div>
            </div>
            <button class="lightbox-close" onclick="closeLightbox()">×</button>
        </div>
        <img id="lbImg" src="" alt="">
        <div class="lightbox-actions">
            <a id="lbDownload" href="#" download class="lightbox-btn" style="display:inline-flex;align-items:center;gap:6px;"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>Download</a>
            <button class="lightbox-btn" onclick="openCaptionModal(lbCurrentId)" style="display:inline-flex;align-items:center;gap:6px;"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125"/></svg>Caption</button>
            <button class="lightbox-btn danger" onclick="deleteItem(lbCurrentId)" style="display:inline-flex;align-items:center;gap:6px;"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg>Delete</button>
        </div>
        <div class="lightbox-nav" id="lbNav"></div>
    </div>
</div>

<div class="caption-modal-overlay" id="captionModal" style="display:none;" onclick="if(event.target===this)closeCaptionModal()">
    <div class="caption-modal">
        <div style="font-size:0.9rem;font-weight:700;margin-bottom:14px;">Edit Caption</div>
        <input type="hidden" id="captionEditId">
        <input class="form-input" id="captionEditInput" type="text" placeholder="Caption...">
        <div style="display:flex;gap:8px;margin-top:14px;">
            <button class="btn btn-secondary" onclick="closeCaptionModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveCaption()">Save</button>
        </div>
    </div>
</div>

<script type="module">import { api, requireAuth } from '/js/api.js';
import { buildSidebar, formatDate, toast } from '/js/utils.js';

const user = requireAuth(['manager']);
let allItems = [];
let lbItems = [];
let lbIndex = 0;
window.lbCurrentId = null;

window.closeLightbox     = closeLightbox;
window.lbPrev            = () => { lbIndex = (lbIndex - 1 + lbItems.length) % lbItems.length; renderLightbox(); };
window.lbNext            = () => { lbIndex = (lbIndex + 1) % lbItems.length; renderLightbox(); };
window.openCaptionModal  = openCaptionModal;
window.closeCaptionModal = closeCaptionModal;
window.saveCaption       = saveCaption;
window.deleteItem        = deleteItem;

if (user) {
    document.getElementById('sidebar').innerHTML = buildSidebar('manager', 'gallery');
    loadGallery();
}

async function loadGallery() {
    try {
        const me = await api('/api/auth/me');
        const tn = document.getElementById('sidebarTeamName');
        if (tn) tn.textContent = me.teamId?.name || '';
        allItems = await api('/api/gallery');
        render();
    } catch (err) {
        document.getElementById('galleryBody').innerHTML = `<p style="color:var(--error);">${err.message}</p>`;
    }
}

function render() {
    const managerRoles = ['manager', 'owner'];
    const managerItems = allItems.filter(m => managerRoles.includes(m.uploadedBy?.role));
    const playerItems  = allItems.filter(m => !managerRoles.includes(m.uploadedBy?.role));

    document.getElementById('galleryBody').innerHTML = `
        <div class="gallery-section">
            <div class="gallery-section-title">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="16" height="16" style="flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z"/></svg>Management Photos
                <span class="gallery-section-count">${managerItems.length} photo${managerItems.length !== 1 ? 's' : ''}</span>
            </div>
            ${managerItems.length ? gridHtml(managerItems, 'mgr') : '<div class="empty-state"><span class="empty-state-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="32" height="32"><path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z"/></svg></span>No photos from management yet.</div>'}
            <div style="margin-top:16px;">
                <label class="btn btn-primary" style="cursor:pointer;font-size:0.78rem;">
                    + Upload Photo
                    <input type="file" id="uploadFileInput" accept="image/*" style="display:none;" onchange="handleUpload(this)">
                </label>
            </div>
        </div>

        <div class="gallery-section">
            <div class="gallery-section-title">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="16" height="16" style="flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>Player Photos
                <span class="gallery-section-count">${playerItems.length} photo${playerItems.length !== 1 ? 's' : ''}</span>
            </div>
            ${playerItems.length ? gridHtml(playerItems, 'plr') : '<div class="empty-state"><span class="empty-state-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="32" height="32"><path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z"/></svg></span>No photos from players yet.</div>'}
        </div>
    `;
}

function gridHtml(items, prefix) {
    return `<div class="gallery-grid">${items.map((m, i) => {
        const p = m.uploadedBy || {};
        const initials = (p.username || '?').slice(0,2).toUpperCase();
        const avatar = p.profilePhotoUrl
            ? `<img class="author-avatar" src="${p.profilePhotoUrl}" alt="">`
            : `<div class="author-avatar">${initials}</div>`;
        return `
        <div class="gallery-card">
            <div class="gallery-thumb" onclick="openLightbox('${prefix}', ${i})">
                <img src="${m.url}" alt="${m.caption || ''}" loading="lazy">
                <div class="gallery-thumb-overlay"><span class="gallery-thumb-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24" style="color:#fff;"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg></span></div>
            </div>
            <div class="gallery-card-author">
                ${avatar}
                <span class="author-name">${p.username || '—'}</span>
                <span class="author-date">${formatDate(m.createdAt)}</span>
            </div>
            <div class="gallery-card-caption">${m.caption || ''}</div>
            <div class="gallery-card-actions">
                <a href="${m.url}" download class="btn btn-secondary btn-xs" title="Download"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="13" height="13"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg></a>
                <button class="btn btn-secondary btn-xs" onclick="openCaptionModal('${m._id}', '${(m.caption||'').replace(/'/g,"\\'")}')"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="13" height="13"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125"/></svg></button>
                <button class="btn btn-secondary btn-xs" style="color:var(--error);border-color:var(--error);" onclick="deleteItem('${m._id}')"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="13" height="13"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg></button>
            </div>
        </div>`;
    }).join('')}</div>`;
}

window.openLightbox = (prefix, idx) => {
    const managerRoles = ['manager', 'owner'];
    lbItems = prefix === 'mgr'
        ? allItems.filter(m => managerRoles.includes(m.uploadedBy?.role))
        : allItems.filter(m => !managerRoles.includes(m.uploadedBy?.role));
    lbIndex = idx;
    document.getElementById('lightbox').style.display = 'flex';
    renderLightbox();
};

function renderLightbox() {
    const m = lbItems[lbIndex];
    if (!m) return;
    window.lbCurrentId = m._id;
    const p = m.uploadedBy || {};
    const avEl = document.getElementById('lbAuthorAv');
    if (p.profilePhotoUrl) avEl.innerHTML = `<img src="${p.profilePhotoUrl}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;">`;
    else avEl.textContent = (p.username || '?').slice(0,2).toUpperCase();
    document.getElementById('lbAuthorName').textContent = p.username || '—';
    document.getElementById('lbCaption').textContent = m.caption || '';
    document.getElementById('lbImg').src = m.url;
    document.getElementById('lbDownload').href = m.url;
    document.getElementById('lbNav').innerHTML = lbItems.length > 1 ? `
        <button onclick="lbPrev()">← Prev</button>
        <span style="color:#888;font-size:0.78rem;padding:6px 4px;">${lbIndex + 1} / ${lbItems.length}</span>
        <button onclick="lbNext()">Next →</button>` : '';
}

function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
    document.getElementById('lbImg').src = '';
}

function openCaptionModal(id, currentCaption = '') {
    document.getElementById('captionEditId').value = id;
    document.getElementById('captionEditInput').value = currentCaption;
    document.getElementById('captionModal').style.display = 'flex';
    setTimeout(() => document.getElementById('captionEditInput').focus(), 50);
}

function closeCaptionModal() { document.getElementById('captionModal').style.display = 'none'; }

async function saveCaption() {
    const id      = document.getElementById('captionEditId').value;
    const caption = document.getElementById('captionEditInput').value.trim();
    try {
        await api(`/api/gallery/${id}/caption`, { method: 'PATCH', body: JSON.stringify({ caption }) });
        toast('Caption saved!', 'success');
        closeCaptionModal();
        const item = allItems.find(m => m._id === id);
        if (item) item.caption = caption;
        render();
        if (document.getElementById('lightbox').style.display !== 'none') {
            document.getElementById('lbCaption').textContent = caption;
        }
    } catch (err) { toast(err.message, 'error'); }
}

async function deleteItem(id) {
    if (!confirm('Delete this photo permanently?')) return;
    closeLightbox();
    try {
        await api(`/api/gallery/${id}`, { method: 'DELETE' });
        toast('Deleted.', 'success');
        allItems = allItems.filter(m => m._id !== id);
        render();
    } catch (err) { toast(err.message, 'error'); }
}

window.handleUpload = async (input) => {
    const file = input.files[0];
    if (!file) return;
    const fd = new FormData();
    fd.append('file', file);
    fd.append('type', 'photo');
    try {
        const token = localStorage.getItem('lp_hub_token');
        const res = await fetch('/api/gallery/upload', {
            method: 'POST',
            headers: { Authorization: 'Bearer ' + token },
            body: fd,
        });
        const d = await res.json();
        if (!res.ok) throw new Error(d.error);
        toast('Photo uploaded!', 'success');
        input.value = '';
        allItems.unshift(d);
        render();
    } catch (err) { toast(err.message, 'error'); }
};

document.addEventListener('keydown', e => {
    if (document.getElementById('lightbox').style.display !== 'none') {
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') window.lbPrev();
        if (e.key === 'ArrowRight') window.lbNext();
    }
});</script>
</body>
</html>
