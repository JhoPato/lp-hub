<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP Hub — Dashboard</title>
    <link rel="stylesheet" href="/css/hub.css">
    <style>.next-event-card { background:linear-gradient(135deg, rgba(223,88,64,0.12) 0%, var(--bg2) 60%); border:1px solid rgba(223,88,64,0.3); border-radius:var(--radius); padding:20px 24px; margin-bottom:24px; display:flex; align-items:center; gap:20px; }
        .next-event-icon { font-size:2.4rem; flex-shrink:0; }
        .next-event-label { font-size:0.68rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--accent); margin-bottom:4px; }
        .next-event-title { font-size:1.1rem; font-weight:700; color:#fff; margin-bottom:4px; }
        .next-event-meta { font-size:0.8rem; color:var(--text-muted); }
        .task-urgent { border-left:3px solid var(--error) !important; }
        .task-today-badge { font-size:0.65rem; background:rgba(255,68,68,0.15); color:var(--error); padding:2px 6px; border-radius:3px; font-weight:700; }</style>
</head>
<body>
<div class="hub-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div class="page-content">
        <div class="page-header">
            <h1>Dashboard</h1>
            <p id="welcomeMsg">Welcome back!</p>
        </div>

        <div id="nextEventHighlight"></div>

        <div id="goalsWidgetWrap"></div>

        <div class="grid-2" style="margin-bottom:24px;">
            <div class="card">
                <div class="card-header">
                    <span class="card-title"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="16" height="16" style="vertical-align:middle;margin-right:5px;flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M10.34 15.84c-.688-.06-1.386-.09-2.09-.09H7.5a4.5 4.5 0 110-9h.75c.704 0 1.402-.03 2.09-.09m0 9.18c.253.962.584 1.892.985 2.783.247.55.06 1.21-.463 1.511l-.657.38c-.551.318-1.26.117-1.527-.461a20.845 20.845 0 01-1.44-4.282m3.102.069a18.03 18.03 0 01-.59-4.59c0-1.586.205-3.124.59-4.59m0 9.18a23.848 23.848 0 018.835 2.535M10.34 6.66a23.847 23.847 0 008.835-2.535m0 0A23.74 23.74 0 0018.795 3m.38 1.125a23.91 23.91 0 011.014 5.395m-1.014 8.855c-.118.38-.245.754-.38 1.125m.38-1.125a23.91 23.91 0 001.014-5.395m0-3.46c.495.413.811 1.035.811 1.73 0 .695-.316 1.317-.811 1.73m0-3.46a24.347 24.347 0 010 3.46"/></svg>Pinned Announcements</span>
                    <a href="/player/announcements.html" style="font-size:0.78rem;">View all →</a>
                </div>
                <div id="pinnedAnnouncements"><p style="color:var(--text-muted);font-size:0.85rem;">Loading...</p></div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span class="card-title"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="16" height="16" style="vertical-align:middle;margin-right:5px;flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>My Tasks</span>
                    <a href="/player/tasks.html" style="font-size:0.78rem;">View all →</a>
                </div>
                <div id="pendingTasks"><p style="color:var(--text-muted);font-size:0.85rem;">Loading...</p></div>
            </div>
        </div>

        <div style="margin-bottom:24px;">
            <div class="card">
                <div class="card-header">
                    <span class="card-title"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="16" height="16" style="vertical-align:middle;margin-right:5px;flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 9v7.5"/></svg>Upcoming Events</span>
                    <a href="/player/schedule.html" style="font-size:0.78rem;">View all →</a>
                </div>
                <div id="upcomingEvents"><p style="color:var(--text-muted);font-size:0.85rem;">Loading...</p></div>
            </div>
        </div>
        </div>
    </main>
</div>

<script type="module">import { api, requireAuth } from '/js/api.js';
import { buildSidebar, formatDateTime, timeFromNow, updateNotificationBadges } from '/js/utils.js';

const user = requireAuth();
if (!user) throw new Error('unauth');
document.getElementById('sidebar').innerHTML = buildSidebar(user.role, 'dashboard');
document.getElementById('welcomeMsg').textContent = `Welcome back, ${user.username}!`;
updateNotificationBadges({ api });

api('/api/auth/me').then(me => {
    const tn = document.getElementById('sidebarTeamName');
    if (tn) tn.textContent = me.teamId?.name || '';
}).catch(() => {});

loadAnnouncements();
loadTasks();
loadEvents();
loadGoalsWidget();

// ── Announcements ──────────────────────────────────────────────────────────
async function loadAnnouncements() {
    const el = document.getElementById('pinnedAnnouncements');
    try {
        const { items: all } = await api('/api/announcements');
        const pinned = (all || []).filter(a => a.isPinned).slice(0, 3);
        if (!pinned.length) { el.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">No pinned announcements.</p>'; return; }
        el.innerHTML = pinned.map(a => `
            <div class="list-row">
                <div>
                    <div style="font-weight:600;font-size:0.9rem;">${a.title}</div>
                    <div style="font-size:0.8rem;color:var(--text-muted);margin-top:2px;">${a.body.slice(0, 90)}${a.body.length > 90 ? '…' : ''}</div>
                </div>
            </div>`).join('');
    } catch(e) {
        el.innerHTML = `<p style="color:var(--text-muted);font-size:0.85rem;">Could not load announcements.</p>`;
    }
}

// ── Tasks ──────────────────────────────────────────────────────────────────
async function loadTasks() {
    const el = document.getElementById('pendingTasks');
    try {
        const [r1, r2] = await Promise.all([
            api('/api/tasks?status=pending&limit=20'),
            api('/api/tasks?status=in_progress&limit=20'),
        ]);
        const all = [...(r1.tasks || []), ...(r2.tasks || [])];
        if (!all.length) { el.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">No open tasks.</p>'; return; }

        const now = new Date();
        const todayEnd   = new Date(); todayEnd.setHours(23,59,59,999);
        const todayStart = new Date(); todayStart.setHours(0,0,0,0);
        const isOverdue  = t => t.dueDate && new Date(t.dueDate) < todayStart;
        const isToday    = t => t.dueDate && new Date(t.dueDate) >= todayStart && new Date(t.dueDate) <= todayEnd;

        el.innerHTML = all.slice(0, 6).map(t => `
            <div class="list-row${isOverdue(t)||isToday(t) ? ' task-urgent' : ''}">
                <div style="flex:1;min-width:0;">
                    <div style="font-weight:600;font-size:0.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.title}</div>
                    <div style="font-size:0.74rem;color:var(--text-muted);margin-top:2px;">
                        ${isOverdue(t) ? `<span class="task-today-badge">OVERDUE</span>` : isToday(t) ? `<span class="task-today-badge">DUE TODAY</span>` : t.dueDate ? 'Due ' + timeFromNow(t.dueDate) : 'No due date'}
                    </div>
                </div>
                <span class="badge badge-${t.priority}">${t.priority}</span>
            </div>`).join('');
    } catch(e) {
        el.innerHTML = `<p style="color:var(--error);font-size:0.83rem;">Failed to load tasks.</p>`;
    }
}

// ── Events ─────────────────────────────────────────────────────────────────
async function loadEvents() {
    const highlight = document.getElementById('nextEventHighlight');
    const el        = document.getElementById('upcomingEvents');
    try {
        const from   = new Date().toISOString();
        const to     = new Date(Date.now() + 14 * 86400000).toISOString();
        const events = await api(`/api/schedule?from=${from}&to=${to}`);
        if (!events.length) {
            highlight.innerHTML = '';
            el.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">No upcoming events.</p>';
            return;
        }
        const next = events[0];
        highlight.innerHTML = `
            <div class="next-event-card">
                <div class="next-event-icon">${typeIcon(next.type, 38)}</div>
                <div style="flex:1;min-width:0;">
                    <div class="next-event-label">Next Event</div>
                    <div class="next-event-title">${next.title}</div>
                    <div class="next-event-meta">${formatDateTime(next.startDate)} · ${timeFromNow(next.startDate)}${next.opponent ? ' · vs ' + next.opponent : ''}</div>
                </div>
                ${next.streamUrl ? `<a href="${next.streamUrl}" target="_blank" class="btn btn-secondary" style="font-size:0.78rem;white-space:nowrap;">Watch</a>` : ''}
            </div>`;
        const rest = events.slice(1, 5);
        el.innerHTML = rest.length ? rest.map(e => `
            <div class="list-row">
                <span>${typeIcon(e.type)}</span>
                <div style="flex:1;">
                    <div style="font-weight:600;font-size:0.88rem;">${e.title}</div>
                    <div style="font-size:0.74rem;color:var(--text-muted);">${formatDateTime(e.startDate)} · ${timeFromNow(e.startDate)}</div>
                </div>
            </div>`).join('') : '<p style="color:var(--text-muted);font-size:0.85rem;">No more events scheduled.</p>';
    } catch(e) {
        highlight.innerHTML = '';
        el.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">Could not load events.</p>';
    }
}

// ── Goals widget ───────────────────────────────────────────────────────────
async function loadGoalsWidget() {
    const wrap = document.getElementById('goalsWidgetWrap');
    if (!wrap) return;
    try {
        const [goalsData, todayData] = await Promise.all([
            api('/api/goals').catch(() => ({ goals: [] })),
            api('/api/henrik/player/today').catch(() => ({ hasRiotId: false, ranked: 0, dm: 0 })),
        ]);
        const goals = goalsData.goals || [];
        const goal  = goals.find(g => g.playerId === user.id) || goals.find(g => g.playerId === 'all');
        if (!goal) { wrap.style.display = 'none'; return; }

        const ranked = Math.max(0, (goal.minRanked || 0) + (goal.playerRankedAdjust || 0));
        const dm     = Math.max(0, (goal.minDM     || 0) + (goal.playerDMAdjust     || 0));

        const rDone  = todayData.ranked || 0;
        const dDone  = todayData.dm     || 0;
        const rPct   = ranked > 0 ? Math.min(100, Math.round(rDone / ranked * 100)) : 100;
        const dPct   = dm     > 0 ? Math.min(100, Math.round(dDone / dm     * 100)) : 100;
        const rColor = rDone >= ranked ? 'var(--success)' : 'var(--accent)';
        const dColor = dDone >= dm     ? 'var(--success)' : '#9f7aea';

        wrap.innerHTML = `
            <div class="card" style="margin-bottom:24px;">
                <div class="card-header">
                    <span class="card-title" style="font-size:0.72rem;">Today's Training Goals</span>
                    <a href="/manager/player-goals.html" style="font-size:0.78rem;">View →</a>
                </div>
                <div style="padding:4px 0 2px;">
                    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
                        <span style="font-size:0.78rem;font-weight:600;width:100px;flex-shrink:0;">Ranked</span>
                        <div style="flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;">
                            <div style="height:100%;width:${rPct}%;background:${rColor};border-radius:4px;transition:width .5s;"></div>
                        </div>
                        <span style="font-size:0.78rem;font-weight:700;width:36px;text-align:right;color:${rDone>=ranked?'var(--success)':'var(--text-muted)'};">${rDone}/${ranked}</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:10px;">
                        <span style="font-size:0.78rem;font-weight:600;width:100px;flex-shrink:0;">Deathmatch</span>
                        <div style="flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;">
                            <div style="height:100%;width:${dPct}%;background:${dColor};border-radius:4px;transition:width .5s;"></div>
                        </div>
                        <span style="font-size:0.78rem;font-weight:700;width:36px;text-align:right;color:${dDone>=dm?'var(--success)':'var(--text-muted)'};">${dDone}/${dm}</span>
                    </div>
                    ${!todayData.hasRiotId ? `<p style="font-size:0.72rem;color:var(--text-muted);margin-top:10px;">
                        <a href="/player/profile.html" style="color:var(--accent);">Connect Riot ID</a> to track progress.</p>` : ''}
                </div>
            </div>`;
    } catch { wrap.style.display = 'none'; }
}

function typeIcon(type, size = 18) {
    const p = (...ds) => `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="${size}" height="${size}" style="flex-shrink:0;">${ds.map(d=>`<path stroke-linecap="round" stroke-linejoin="round" d="${d}"/>`).join('')}</svg>`;
    const m = {
        tournament: p(`M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.562.562 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z`),
        match:      p(`M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z`),
        stream:     p(`M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 010 1.972l-11.54 6.347a1.125 1.125 0 01-1.667-.986V5.653z`),
        training:   p(`M2.25 10.5A4.5 4.5 0 016.75 6h10.5a4.5 4.5 0 014.5 4.5v3a4.5 4.5 0 01-4.5 4.5H6.75a4.5 4.5 0 01-4.5-4.5v-3z`,`M8.25 12h1.5m-.75-.75v1.5m6.75-.75h.008v.008H15v-.008zm1.5 0h.008v.008h-.008v-.008z`),
        warmup:     p(`M15.362 5.214A8.252 8.252 0 0112 21 8.25 8.25 0 016.038 7.047 8.287 8.287 0 009 9.601a8.983 8.983 0 013.361-6.867 8.21 8.21 0 003 2.48z`,`M12 18a3.75 3.75 0 00.495-7.468 5.99 5.99 0 00-1.925 3.547 5.975 5.975 0 01-2.133-1.001A3.75 3.75 0 0012 18z`),
    };
    return m[type] || p(`M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 9v7.5`);
}</script>
<script src="/js/discord-notify.js"></script>
</body>
</html>
